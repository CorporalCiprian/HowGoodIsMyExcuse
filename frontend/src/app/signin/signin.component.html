<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<div class="relative flex min-h-screen bg-surface text-on-surface overflow-hidden font-body">

  <!-- Ambient orbs -->
  <div class="absolute -top-32 -left-24 w-[520px] h-[520px] rounded-full bg-primary-container/30 blur-[100px] pointer-events-none z-0"></div>
  <div class="absolute -bottom-20 right-[10%] w-[400px] h-[400px] rounded-full bg-primary/10 blur-[100px] pointer-events-none z-0"></div>

  <!-- ── Left editorial panel ── -->
  <aside class="relative z-10 hidden md:flex flex-col justify-between w-1/2 bg-surface-low px-16 py-12 pl-[4.5rem]">

    <!-- Brand -->
    <div class="flex items-center gap-2">
      <span class="w-2 h-2 rounded-full bg-secondary-container animate-pulse"></span>
      <span class="font-display font-bold tracking-[0.12em] text-sm text-on-surface">
        EXCUSE<span class="text-primary">IQ</span>
      </span>
    </div>

    <!-- Headline copy -->
    <div class="flex flex-col gap-5">
      <p class="text-[0.6875rem] font-semibold tracking-[0.1em] text-primary uppercase">Verdict Engine</p>
      <h1 class="font-display font-bold text-[clamp(2.8rem,4.5vw,3.5rem)] leading-[1.08] text-on-surface -ml-0.5">
        Is your<br />excuse<br />good enough?
      </h1>
      <p class="text-[0.9375rem] leading-relaxed text-on-surface-variant max-w-[28ch]">
        We run your excuse through our proprietary credibility engine and give you a verdict. No mercy.
      </p>
    </div>

    <!-- Stats -->
    <div class="flex gap-12">
      <div class="flex flex-col gap-1">
        <span class="font-display font-semibold text-[1.75rem] tracking-tight text-on-surface">1.2M+</span>
        <span class="text-[0.6875rem] font-medium tracking-[0.1em] text-on-surface-variant uppercase">Excuses Rated</span>
      </div>
      <div class="flex flex-col gap-1">
        <span class="font-display font-semibold text-[1.75rem] tracking-tight text-on-surface">34%</span>
        <span class="text-[0.6875rem] font-medium tracking-[0.1em] text-on-surface-variant uppercase">Actually Believable</span>
      </div>
    </div>
  </aside>

  <!-- ── Right form panel ── -->
  <main class="relative z-10 flex flex-1 items-center justify-center px-6 py-12 bg-surface">

    <!-- Glass card -->
    <div class="w-full max-w-[420px] rounded-lg bg-surface-highest/55 backdrop-blur-glass shadow-ambient outline outline-1 outline-outline-variant p-10">

      <!-- Card header -->
      <div class="mb-8">
        <p class="text-[0.6875rem] font-semibold tracking-[0.1em] text-primary uppercase mb-1">Access Your Account</p>
        <h2 class="font-display font-bold text-[1.875rem] tracking-tight text-on-surface">Sign In</h2>
      </div>

      <!-- Form -->
      <form class="flex flex-col gap-5" (ngSubmit)="onSubmit()" autocomplete="off">

        <!-- Email -->
        <div class="flex flex-col gap-2">
          <label class="text-[0.6875rem] font-semibold tracking-[0.1em] text-on-surface-variant uppercase select-none" for="email">
            Email Address
          </label>
          <div class="relative flex items-center">
            <svg class="absolute left-3.5 w-4 h-4 text-on-surface-variant pointer-events-none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/>
            </svg>
            <input
              id="email"
              type="email"
              placeholder="you@example.com"
              [value]="email()"
              (input)="onEmailChange($any($event.target).value)"
              autocomplete="email"
              class="peer w-full pl-11 pr-4 py-3 rounded-md bg-surface-lowest text-on-surface text-[0.9375rem] placeholder:text-on-surface-variant/50 border border-outline-variant outline-none transition-all focus:bg-surface-bright focus:border-primary focus:ring-2 focus:ring-primary/10 caret-primary"
            />
          </div>
        </div>

        <!-- Password -->
        <div class="flex flex-col gap-2">
          <label class="text-[0.6875rem] font-semibold tracking-[0.1em] text-on-surface-variant uppercase select-none" for="password">
            Password
          </label>
          <div class="relative flex items-center">
            <svg class="absolute left-3.5 w-4 h-4 text-on-surface-variant pointer-events-none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/>
            </svg>
            <input
              id="password"
              [type]="showPassword() ? 'text' : 'password'"
              placeholder="••••••••••••"
              [value]="password()"
              (input)="onPasswordChange($any($event.target).value)"
              autocomplete="current-password"
              class="w-full pl-11 pr-11 py-3 rounded-md bg-surface-lowest text-on-surface text-[0.9375rem] placeholder:text-on-surface-variant/50 border border-outline-variant outline-none transition-all focus:bg-surface-bright focus:border-primary focus:ring-2 focus:ring-primary/10 caret-primary tracking-[0.05em]"
            />
            <button
              type="button"
              (click)="togglePasswordVisibility()"
              class="absolute right-3.5 w-5 h-5 flex items-center justify-center text-on-surface-variant hover:text-primary transition-colors"
            >
              <svg *ngIf="!showPassword()" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="w-[18px] h-[18px]">
                <path d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/>
                <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              </svg>
              <svg *ngIf="showPassword()" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="w-[18px] h-[18px]">
                <path d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Error -->
        <div *ngIf="errorMessage()" class="flex items-start gap-2 px-4 py-3 rounded-md bg-tertiary-container/30 border-l-2 border-tertiary">
          <svg class="w-4 h-4 text-tertiary shrink-0 mt-0.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/>
          </svg>
          <span class="text-[0.8125rem] text-tertiary leading-relaxed">{{ errorMessage() }}</span>
        </div>

        <!-- Forgot -->
        <div class="flex justify-end -mt-1">
          <a href="#" class="text-[0.8125rem] text-on-surface-variant hover:text-primary transition-colors">Forgot password?</a>
        </div>

        <!-- Submit -->
        <button
          type="submit"
          [disabled]="isLoading()"
          class="mt-1 w-full flex items-center justify-center gap-2.5 py-3.5 px-6 rounded-md bg-primary-gradient text-[0.8125rem] font-semibold tracking-[0.06em] text-surface shadow-ambient hover:shadow-ambient-lg hover:-translate-y-px active:translate-y-0 transition-all duration-150 disabled:opacity-70 disabled:cursor-not-allowed"
        >
          <ng-container *ngIf="!isLoading()">
            GET MY VERDICT
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"/>
            </svg>
          </ng-container>
          <ng-container *ngIf="isLoading()">
            <span class="w-3.5 h-3.5 rounded-full border-2 border-surface/30 border-t-surface animate-spin"></span>
            SIGNING IN&hellip;
          </ng-container>
        </button>

      </form>

      <!-- Footer -->
      <p class="mt-7 text-center text-[0.8125rem] text-on-surface-variant">
        No account yet?
        <a routerLink="/register" class="text-primary hover:text-on-surface transition-colors font-medium">Sign up free</a>
      </p>

    </div>
  </main>

</div>
