version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: howgoodismyexcuse-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-howgoodismyexcuse}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend/HowGoodIsMyExcuse.Api
      dockerfile: Dockerfile
    container_name: howgoodismyexcuse-api
    ports:
      - "5000:5000"
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=${DB_NAME:-howgoodismyexcuse};Username=${DB_USER:-postgres};Password=${DB_PASSWORD:-postgres}
      - Groq__ApiKey=${GROQ_API_KEY}
      - Jwt__Secret=${JWT_SECRET}
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: howgoodismyexcuse-frontend
    ports:
      - "80:80"
    environment:
      - API_URL=http://api:5000
    depends_on:
      - api
    networks:
      - app-network
    restart: unless-stopped

volumes:
  pgdata:
    driver: local

networks:
  app-network:
    driver: bridge
